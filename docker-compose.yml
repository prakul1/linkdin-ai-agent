version: "3.9"
services:
  api:
    build: .
    container_name: linkedin-ai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
  db-viewer:
    image: coleifer/sqlite-web:latest
    container_name: linkedin-ai-db-viewer
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    command: sqlite_web -H 0.0.0.0 -p 8080 /data/app.db
    restart: unless-stopped
    depends_on:
      - api
  # Future services:
  # streamlit:  (Phase 4)
  # postgres:   (when moving to cloud)